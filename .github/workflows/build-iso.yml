---
name: Build ISOs

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to build ISO from'
        required: false
        default: 'testing'
        type: choice
        options:
          - testing
          - latest
          - stable

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-iso
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO (${{ matrix.image }})
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: razorfin-arm
            image-ref: ghcr.io/razorfinos-org/razorfin-arm:${{ inputs.channel || 'testing' }}
          - image: razorfin-arm-rpi5
            image-ref: ghcr.io/razorfinos-org/razorfin-arm-rpi5:${{ inputs.channel || 'testing' }}
          - image: razorfin-arm-rockchip
            image-ref: ghcr.io/razorfinos-org/razorfin-arm-rockchip:${{ inputs.channel || 'testing' }}

    steps:
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build ISO
        uses: ublue-os/titanoboa@main
        id: build
        with:
          image-ref: ${{ matrix.image-ref }}
          iso-dest: ${{ matrix.image }}-live-aarch64.iso
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_iso.sh

      - name: Generate checksum
        id: checksum
        shell: bash
        run: |
          ISO_UPLOAD_DIR=${{ github.workspace }}/upload
          DEST="${ISO_UPLOAD_DIR}/$(basename ${{ steps.build.outputs.iso-dest }})"
          mkdir -p "${ISO_UPLOAD_DIR}"
          mv "${{ steps.build.outputs.iso-dest }}" "${DEST}"
          sha256sum "${DEST}" > "${DEST}.sha256"
          echo "iso-upload-dir=${ISO_UPLOAD_DIR}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO and checksum to R2
        shell: bash
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SOURCE_DIR: ${{ steps.checksum.outputs.iso-upload-dir }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          rclone copy "${SOURCE_DIR}" R2:${{ secrets.R2_BUCKET_NAME }}
