# Razorfin ARM — Gaming performance tuning
# Values match Bazzite (proven on Steam Deck / millions of devices)
# Source: https://github.com/ublue-os/bazzite

# Allow more memory-mapped areas (required by many Proton/Wine games)
vm.max_map_count = 2147483642

# ZRAM-optimized swappiness (Fedora ships zram-generator by default)
vm.swappiness = 180

# Disable readahead clustering for ZRAM (random access, no benefit)
vm.page-cluster = 0

# Explicit dirty writeback thresholds (bytes) for predictable frame pacing
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 134217728

# Disable watermark boosting (reduces unnecessary memory reclaim stalls)
vm.watermark_boost_factor = 0

# Increase watermark scale for better kswapd behavior under memory pressure
vm.watermark_scale_factor = 125

# TCP optimizations for game downloads and multiplayer
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_mtu_probing = 1
